<body
  style="
    margin: 0;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #9c2700, #cc5225, #c26641);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
  "
>
  <div
    style="
      max-width: 420px;
      padding: 40px 30px;
      text-align: center;
      background: rgba(0, 0, 0, 0.35);
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(10px);
    "
  >
    <div
      style="
        font-size: 64px;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 16px;
        color: #ffcabc;
      "
    >
      <p>%sveltekit.status%</p>
    </div>

    <div
      style="
        font-size: 22px;
        font-weight: 600;
        margin-bottom: 12px;
        color: #ffffff;
      "
    >
      <p>%sveltekit.error.message%</p>
    </div>

    <p
      style="
        font-size: 15px;
        line-height: 1.6;
        opacity: 0.9;
        margin-bottom: 28px;
      "
    >
      متاسفانه خطایی پیش آمده است
    </p>

    <a
      href="/"
      style="
        display: inline-block;
        padding: 12px 26px;
        font-size: 14px;
        font-weight: 600;
        color: #ffffff;
        background: #ff3e00;
        border-radius: 999px;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      "
      onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 12px 28px rgba(0,0,0,0.45)'"
      onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 8px 20px rgba(0,0,0,0.35)'"
    >
      بازگشت به صفحه اصلی
    </a>
  </div>
</body>
